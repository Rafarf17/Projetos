<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pg1</title>
    <style>
    body {
        background-color: rgb(175, 147, 219);
        font-family: Impact, 'Arial Narrow Bold', sans-serif;
    }

    h1 {
        color: rgb(8, 4, 22);
    }
    </style>
</head>
<body>

    <h1>olá, mundo!</h1>
    <p>to livre</p>

    <script>
        var n1 = Number(window.prompt('Coloque um número: '))
        var n2 = Number(window.prompt('Coloque outro número: '))
        var tot = n1 + n2
        document.write(`Seu número é ${tot}`)// fica na pagina
        window.alert(`Seu número é ${tot}`)// fica no aviso
    </script>
</body>
</html>

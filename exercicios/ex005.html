<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma</title>
    <style>
       body{
        font: 18pt Arial;
       }

       input{
        font: 18pt arial normal;
        width: 100px;
       }

       div#res{
        margin-top: 10px;
       }
    </style>
</head>
<body>
    <h1>Faça a soma: </h1>
    <input type="number" name="txt1" id="txt1"> +
    <input type="number" name="txt2" id="txt2">
    <input type="button" value="somar" onclick="soma()">
    <div id="res">Resultado...</div>
</body>

<script>
function soma(){
    var tn1 = document.getElementById('txt1')
    var tn2 = document.getElementById('txt2')
    var res = document.getElementById('res')
    var n1 = Number(tn1.value)
    var n2 = Number(tn2.value)
    var r = n1 + n2
    res.innerText = r
}
</script>
</html>

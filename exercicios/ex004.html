<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste de DOM</title>
    <style>
        div#area{
            font: 24pt arial ;
            height: 200px;
            width: 200px;
            background-color: rgb(100, 100, 100);
            line-height: 200px;
            text-align: center;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()"> clique aqui</div>
</body>

<script>
    var a = document.getElementById('area')
    
    function clicar(){
        a.innerText = 'Clicou'
        a.style.background = 'red'
    }

    function entrar(){
        a.innerText = 'entrou'
    }

    function sair(){
        a.innerText = 'saiu'
        a.style.background = 'green'
    }
</script>
</html>
